<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- ═══════════════ SHIP ═══════════════ -->

  <!-- Mast (drawn first so skeleton renders on top) -->
  <line x1="63" y1="80" x2="63" y2="6" stroke="#e53e3e" stroke-width="1.8"/>

  <!-- Yard arm -->
  <line x1="63" y1="13" x2="88" y2="17" stroke="#e53e3e" stroke-width="1.3"/>

  <!-- Main sail -->
  <path d="M63,13 Q77,19 88,17 Q85,48 63,50 Z" fill="#e53e3e" opacity="0.16" stroke="#e53e3e" stroke-width="0.8"/>

  <!-- Rigging -->
  <line x1="88" y1="17" x2="92" y2="79" stroke="#e53e3e" stroke-width="0.7" opacity="0.4"/>

  <!-- Flag -->
  <path d="M63,6 L78,9 L78,3 Z" fill="#e53e3e" opacity="0.8"/>

  <!-- Ship deck -->
  <path d="M4,80 Q52,84 96,80" stroke="#e53e3e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Hull body -->
  <path d="M7,76 Q52,91 93,76" stroke="#e53e3e" stroke-width="1" opacity="0.5"/>
  <path d="M4,80 Q52,97 96,80 L93,76 Q52,91 7,76 Z" fill="#e53e3e" opacity="0.1"/>
  <path d="M13,87 Q52,97 87,87" stroke="#e53e3e" stroke-width="0.7" opacity="0.28"/>

  <!-- Cannon port -->
  <circle cx="76" cy="78" r="3" fill="none" stroke="#e53e3e" stroke-width="1" opacity="0.45"/>
  <line x1="79" y1="78" x2="83" y2="78" stroke="#e53e3e" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>


  <!-- ═══════════════ PIRATE SKELETON ═══════════════ -->

  <!-- SKULL: center (38, 28), radius 8 -->
  <circle cx="38" cy="28" r="8" fill="#e53e3e"/>

  <!-- PIRATE HAT (tricorn) -->
  <ellipse cx="38" cy="21" rx="13" ry="3" fill="#e53e3e"/>
  <path d="M25,21 Q38,5 51,21 Z" fill="#e53e3e"/>
  <!-- Brim shadow line -->
  <path d="M25,21 Q38,17.5 51,21" stroke="#12141c" stroke-width="1.1" fill="none" opacity="0.3"/>
  <!-- Tiny skull on hat -->
  <circle cx="38" cy="13" r="2.2" fill="#12141c" opacity="0.28"/>

  <!-- Left eye (open) -->
  <ellipse cx="35" cy="27" rx="2" ry="2.3" fill="#12141c"/>
  <!-- Right eye: EYE PATCH -->
  <ellipse cx="41.5" cy="27" rx="3.5" ry="3" fill="#12141c"/>
  <!-- Patch strap -->
  <line x1="38.5" y1="24.5" x2="45.5" y2="24" stroke="#12141c" stroke-width="0.9" opacity="0.55"/>

  <!-- Nasal cavity -->
  <path d="M36.5,31 L39.5,31 L38,33.5 Z" fill="#12141c" opacity="0.6"/>

  <!-- Teeth -->
  <path d="M33.5,36 Q38,39 42.5,36" stroke="#12141c" stroke-width="0.7" fill="none" opacity="0.4"/>
  <line x1="36" y1="36" x2="36" y2="38" stroke="#12141c" stroke-width="0.7" opacity="0.4"/>
  <line x1="38" y1="36" x2="38" y2="38" stroke="#12141c" stroke-width="0.7" opacity="0.4"/>
  <line x1="40" y1="36" x2="40" y2="38" stroke="#12141c" stroke-width="0.7" opacity="0.4"/>

  <!-- Spine -->
  <line x1="38" y1="36" x2="38" y2="62" stroke="#e53e3e" stroke-width="2" stroke-linecap="round"/>

  <!-- Shoulders -->
  <line x1="28" y1="41" x2="48" y2="41" stroke="#e53e3e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Ribs -->
  <path d="M38,44 Q33,46 31,50" stroke="#e53e3e" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M38,44 Q43,42 45,46" stroke="#e53e3e" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M38,49 Q33,51 31,55" stroke="#e53e3e" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M38,49 Q43,47 45,51" stroke="#e53e3e" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Pelvis -->
  <path d="M30,63 Q38,59 46,63 Q47,68 38,69 Q29,68 30,63 Z" stroke="#e53e3e" stroke-width="1.3" fill="none"/>

  <!-- Sword arm (right arm, going up-right toward cutlass) -->
  <line x1="48" y1="41" x2="54" y2="35" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="35" x2="59" y2="30" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="60" cy="29" r="2" fill="#e53e3e"/>
  <!-- Cutlass blade -->
  <line x1="60" y1="29" x2="78" y2="13" stroke="#e53e3e" stroke-width="3" stroke-linecap="round"/>
  <!-- Cross-guard -->
  <line x1="64" y1="22" x2="68" y2="28" stroke="#e53e3e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Back arm (left arm, hanging) -->
  <line x1="28" y1="41" x2="22" y2="49" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="49" x2="20" y2="60" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="62" r="1.7" fill="#e53e3e"/>

  <!-- Left leg -->
  <line x1="34" y1="69" x2="30" y2="75" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="75" x2="27" y2="81" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="81" x2="21" y2="82" stroke="#e53e3e" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Right leg (peg leg) -->
  <line x1="42" y1="69" x2="46" y2="75" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="75" x2="48" y2="82" stroke="#e53e3e" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="82.5" x2="51" y2="82.5" stroke="#e53e3e" stroke-width="1.8" stroke-linecap="round"/>

</svg>
